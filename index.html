<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hyperfucked</title>
    <link rel="icon" type="image/x-icon" href="./assets/pngs/logo.png" />

    <link rel="stylesheet" href="./styles/variables.css" />
    <link rel="stylesheet" href="./styles/fonts.css" />
    <link rel="stylesheet" href="./styles/header-footer.css" />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="./styles/card.css" />
    <link rel="stylesheet" href="./styles/dialog.css" />
    <link rel="stylesheet" href="./styles/assets.css" />
    <link rel="stylesheet" href="./styles/responsive.css" />

    <script src="./scripts/data.js" defer></script>
    <script src="./scripts/template.js" defer></script>
    <script src="./scripts/helper-functions.js" defer></script>
    <script src="./scripts/auth.js" defer></script>
    <script src="script.js" defer></script>
  </head>

  <body>
    <header class="index-header" id="header">
      <div class="header-content">
        <div class="header-content-left">
          <img class="logo" src="./assets/pngs/logo.png" alt="" />
          <nav>
            <button class="nav-btn" onclick="renderCard('all')">Alle Einträge</button>
            <button class="nav-btn" onclick="renderCard('saved')">Gespeicherte</button>
          </nav>
        </div>
        <div class="login" id="login"></div>
      </div>
    </header>

    <main class="index-main">
      <h1 id="main-heading"></h1>

      <section class="card-wrapper" id="card-wrapper"></section>

    </main>
    
    <dialog
      id="card-dialog"
      onclick="closeDialog()"
      onclose="this.classList.remove('opened'); document.body.classList.remove('dialog-open');"
    ></dialog>

    <footer></footer>
  </body>
</html>
