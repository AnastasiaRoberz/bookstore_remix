<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hyperfucked</title>
    <link rel="icon" type="image/x-icon" href="./assets/pngs/logo.png" />

    <link rel="stylesheet" href="./styles/variables.css" />
    <link rel="stylesheet" href="./styles/fonts.css" />
    <link rel="stylesheet" href="./styles/header-footer.css" />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="./styles/card.css" />
    <link rel="stylesheet" href="./styles/dialog.css" />
    <link rel="stylesheet" href="./styles/assets.css" />
    <link rel="stylesheet" href="./styles/responsive.css" />

    <script src="./scripts/data.js" defer></script>
    <script src="./scripts/template.js" defer></script>
    <script src="./scripts/helper-functions.js" defer></script>
    <script src="script.js" defer></script>
  </head>

  <body>
    <header>
      <div class="header-content">
        <img class="logo" src="./assets/pngs/logo.png" alt="" />
        <nav>
          <button class="nav-btn" onclick="renderCard()">Alle Einträge</button>
          <button class="nav-btn" onclick="renderSavedCards()">Gespeicherte</button>
        </nav>

        <div class="login">
          <input
            type="text"
            id="user-input"
            placeholder="enter an username"
          />
          <button class="btn-add-user" onclick="addUser()">User speichern</button>
        </div>
      </div>
    </header>

    <main>
      <h1>Die Galerie der teuren Staubfänger</h1>

      <section class="card-wrapper" id="card-wrapper"></section>

      <dialog
        id="card-dialog"
        onclick="closeDialog()"
        onclose="this.classList.remove('opened')"
      ></dialog>
    </main>

    <footer></footer>
  </body>
</html>
